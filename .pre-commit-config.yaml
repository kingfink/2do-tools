repos:
  - repo: local
    hooks:
      - id: py-compile
        name: py_compile
        entry: python3 -m py_compile
        language: system
        types: [python]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
