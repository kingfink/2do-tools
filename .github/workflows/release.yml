name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, such as v0.3.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out master
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install mcpb
        run: npm install -g @anthropic-ai/mcpb

      - name: Verify release metadata
        run: python3 scripts/release_metadata.py verify "${{ inputs.tag }}"

      - name: Compile Python files
        run: git ls-files '*.py' -z | xargs -0 python3 -m py_compile

      - name: Check linting
        uses: astral-sh/ruff-action@146cd51f235777a9bc491eead18e0d5a4b05406a # v3
        with:
          version: 0.15.15
          args: check --output-format=github .

      - name: Check formatting
        uses: astral-sh/ruff-action@146cd51f235777a9bc491eead18e0d5a4b05406a # v3
        with:
          version: 0.15.15
          args: format --check .

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/release.sh "${{ inputs.tag }}"
