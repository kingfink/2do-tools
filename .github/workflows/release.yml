name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, such as v0.3.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install mcpb
        run: npm install -g @anthropic-ai/mcpb

      - name: Verify release metadata
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must look like vX.Y.Z (got: $TAG)" >&2
            exit 1
          fi

          version="${TAG#v}"
          project_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          manifest_version="$(python3 -c 'import json; print(json.load(open("mcpb/manifest.json"))["version"])')"

          if [[ "$project_version" != "$version" ]]; then
            echo "pyproject.toml version $project_version does not match $version" >&2
            exit 1
          fi

          if [[ "$manifest_version" != "$version" ]]; then
            echo "mcpb/manifest.json version $manifest_version does not match $version" >&2
            exit 1
          fi

          grep -q "@$TAG" README.md
          grep -q "@$TAG" mcpb/manifest.json
          grep -q "@$TAG" mcpb/server.py

      - name: Compile Python files
        run: git ls-files '*.py' -z | xargs -0 python3 -m py_compile

      - name: Check linting
        uses: astral-sh/ruff-action@v3
        with:
          version: 0.15.15
          args: check --output-format=github .

      - name: Check formatting
        uses: astral-sh/ruff-action@v3
        with:
          version: 0.15.15
          args: format --check .

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/release.sh "${{ inputs.tag }}"
